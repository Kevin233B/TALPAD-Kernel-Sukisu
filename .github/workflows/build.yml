name: Build Kernel with SukiSU

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential git wget curl \
          libncurses-dev flex bison bc libelf-dev \
          device-tree-compiler gawk ccache pigz zstd cpio rsync lzop
    
    - name: Install OpenSSL 1.1 (for kernel 4.19)
      run: |
        # 添加 Ubuntu 20.04 (focal) 的软件源获取 OpenSSL 1.1
        sudo add-apt-repository -y "deb http://security.ubuntu.com/ubuntu focal-security main"
        sudo apt update
        sudo apt install -y libssl1.1 libssl-dev=1.1.1f-1ubuntu2.27
        
        # 创建软链接确保编译能找到
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libssl.so.1.1 /usr/lib/x86_64-linux-gnu/libssl.so
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libcrypto.so.1.1 /usr/lib/x86_64-linux-gnu/libcrypto.so
        
        # 验证
        openssl version
    
    - name: Setup Linaro GCC
      run: |
        cd $HOME
        wget -q https://releases.linaro.org/components/toolchain/binaries/7.5-2019.12/aarch64-linux-gnu/gcc-linaro-7.5.0-2019.12-x86_64_aarch64-linux-gnu.tar.xz
        tar -xf gcc-linaro-7.5.0-2019.12-x86_64_aarch64-linux-gnu.tar.xz
        echo "$HOME/gcc-linaro-7.5.0-2019.12-x86_64_aarch64-linux-gnu/bin" >> $GITHUB_PATH
        echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
        echo "ARCH=arm64" >> $GITHUB_ENV
    
    - name: Verify toolchain
      run: |
        aarch64-linux-gnu-gcc --version
        openssl version
    
    - name: Integrate SukiSU
      run: |
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin
    
    - name: Fix script permissions
      run: |
        chmod +x scripts/gcc-version.sh 2>/dev/null || true
        chmod +x scripts/clang-version.sh 2>/dev/null || true
        chmod +x scripts/gcc-plugin.sh 2>/dev/null || true
    
    - name: Build tb8788p1
      run: |
        echo "========================================="
        echo "编译配置: tb8788p1_64_wifi_k419_defconfig"
        echo "========================================="
        make tb8788p1_64_wifi_k419_defconfig
        make -j$(nproc)
        mkdir -p output/tb8788p1
        cp -r arch/arm64/boot output/tb8788p1/ 2>/dev/null || true
        echo "tb8788p1 编译完成"
    
    - name: Build ls12_mt8797
      run: |
        echo "========================================="
        echo "编译配置: ls12_mt8797_wifi_64_defconfig"
        echo "========================================="
        make ls12_mt8797_wifi_64_defconfig
        make -j$(nproc)
        mkdir -p output/ls12_mt8797
        cp -r arch/arm64/boot output/ls12_mt8797/ 2>/dev/null || true
        echo "ls12_mt8797 编译完成"
    
    - name: Build ls14_mt8797
      run: |
        echo "========================================="
        echo "编译配置: ls14_mt8797_wifi_64_defconfig"
        echo "========================================="
        make ls14_mt8797_wifi_64_defconfig
        make -j$(nproc)
        mkdir -p output/ls14_mt8797
        cp -r arch/arm64/boot output/ls14_mt8797/ 2>/dev/null || true
        echo "ls14_mt8797 编译完成"
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-images
        path: output/
